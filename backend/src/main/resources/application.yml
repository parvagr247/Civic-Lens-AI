server:
  port: ${PORT:9526}
  servlet:
    context-path: /

spring:
  application:
    name: civiclens-ai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    banner-mode: console
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

  # Spring AI Gemini Integration Configuration
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:mock-gemini-key}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.5-flash}
            temperature: 0.2

# Custom Application Properties
app:
  version: 1.0.0
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  # Firebase Configuration Details
  firebase:
    config-path: ${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}
    database-url: ${FIREBASE_DATABASE_URL:}
    storage-bucket: ${FIREBASE_STORAGE_BUCKET:civiclens-ai.firebasestorage.app}

# Embabel Agent Framework Configuration
embabel:
  models:
    default-llm: ${GEMINI_MODEL:gemini-2.5-flash}
  agent:
    platform:
      models:
        googlegenai:
          api-key: ${GEMINI_API_KEY:mock-gemini-key}

# Springdoc Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: true

# Logging Configuration
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.ai: DEBUG
