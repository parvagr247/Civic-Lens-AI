services:
  backend:
    image: civiclens-backend:stable
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civiclens-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - PORT=${PORT:-9526}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock-gemini-key}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL:-}
      - APP_ALLOWED_ORIGINS=${APP_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    volumes:
      - civiclens-logs:/opt/civiclens/logs
    networks:
      - civiclens-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9526/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: civiclens-frontend:stable
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civiclens-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - civiclens-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  civiclens-logs:
    driver: local

networks:
  civiclens-network:
    name: civiclens-network
    driver: bridge
